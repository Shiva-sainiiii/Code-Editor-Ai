<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Shiva Editor — Professional AI IDE</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="app-header">
    <div class="logo-section">
      <div class="logo-icon"><i class="ph-fill ph-lightning"></i></div>
      <h1>Shiva <span>Editor</span></h1>
    </div>
    
    <nav class="top-buttons" role="toolbar" aria-label="Editor actions">
      <button onclick="runPreview()" class="btn-primary" title="Run Code">
        <i class="ph ph-play"></i> <span>Preview</span>
      </button>
      <div class="v-separator"></div>
      <button onclick="openFile()" title="Open File">
        <i class="ph ph-folder-open"></i> <span>Open</span>
      </button>
      <button onclick="saveFile()" title="Download File">
        <i class="ph ph-floppy-disk"></i> <span>Save</span>
      </button>
    </nav>
  </header>

  <main class="editor-container">
    <div id="lineNumbers" class="line-numbers">1</div>
    <div id="codeArea" class="code-editor" contenteditable="true" spellcheck="false" autocomplete="off">
      <div class="code-line"></div>
    </div>
    
    <div id="suggestBox" class="suggestion-box" style="display:none;"></div>
  </main>

  <footer class="status-bar">
    <div class="status-left">
      <span class="status-item"><i class="ph ph-file-code"></i> index.html</span>
      <span id="cursorPos" class="status-item">Ln 1, Col 1</span>
    </div>
    <div class="status-right">
      <span id="syncStatus" class="status-item"><i class="ph ph-cloud-check"></i> Cloud Synced</span>
      <button onclick="toggleWrap()" id="wrapBtn" title="Toggle Word Wrap"><i class="ph ph-text-indent"></i></button>
      <button onclick="fontMinus()"><i class="ph ph-minus"></i></button>
      <button onclick="fontPlus()"><i class="ph ph-plus"></i></button>
    </div>
  </footer>

  <aside class="side-tools">
    <button onclick="openAIPanel()" class="tool-btn ai-trigger" title="AI Assistant">
      <i class="ph-fill ph-sparkle"></i>
    </button>
    <button onclick="analyzeCode()" class="tool-btn" title="Analyze Code">
      <i class="ph ph-magnifying-glass"></i>
    </button>
    <button onclick="copyCode()" class="tool-btn" title="Copy All">
      <i class="ph ph-copy"></i>
    </button>
    <button onclick="clearEditor()" class="tool-btn" title="Clear All">
      <i class="ph ph-trash"></i>
    </button>
  </aside>

  <div id="aiPanel" class="ai-panel" aria-hidden="true">
    <div id="dragHandle" class="drag-handle"></div>
    
    <div class="ai-header">
      <div class="ai-tabs">
        <button id="tabAnalyze" class="tab-btn active" onclick="showAnalyze()">Chat & Analysis</button>
        <button id="tabConvert" class="tab-btn" onclick="showConvert()">Code Generator</button>
      </div>
      <button class="close-panel" onclick="closeAIPanel()"><i class="ph ph-x"></i></button>
    </div>

    <div class="ai-body">
      <div id="pageAnalyze" class="ai-page">
        <div id="aiOutput" class="ai-chat-area">
          <div class="welcome-msg">
            <i class="ph ph-robot"></i>
            <p>I can help you debug, optimize, or explain your code. Click "Find Bugs" or ask a question below.</p>
          </div>
        </div>

        <div class="ai-input-container">
          <div class="input-wrapper">
            <input id="aiInput" type="text" placeholder="Ask anything about your code..." />
            <button onclick="sendAI()" class="send-btn">
              <i class="ph-fill ph-paper-plane-right"></i>
            </button>
          </div>
        </div>
      </div>

      <div id="pageConvert" class="ai-page" style="display:none;">
        <div class="generator-box">
          <div class="gen-header">
            <h3>Describe the code you need</h3>
            <span class="tip">Example: "A responsive navigation bar with a glass effect"</span>
          </div>
          <textarea id="convertPrompt" placeholder="Type your requirements here..."></textarea>
          
          <div class="gen-footer">
            <button onclick="convertTextToCode(false)" class="btn-gen-insert">
              <i class="ph ph-magic-wand"></i> Generate & Insert
            </button>
            <button onclick="convertTextToCode(true)" class="btn-gen-preview">
              <i class="ph ph-eye"></i> Preview Only
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <textarea id="pasteHelper" style="position:fixed; left:-9999px; top:-9999px; opacity:0;"></textarea>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBeiIUdVEv5kvJ6GFSzWZwFav8Nx3Mxhkg",
      authDomain: "code-editor-ai.firebaseapp.com",
      projectId: "code-editor-ai",
      storageBucket: "code-editor-ai.firebasestorage.app",
      messagingSenderId: "145185559673",
      appId: "1:145185559673:web:5646addc66bb365209b0a8",
      measurementId: "G-CYWKWQJGP0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Global hooks so other scripts can access them
    window.saveCloud = async (code) => {
      const statusIcon = document.querySelector("#syncStatus i");
      const statusText = document.querySelector("#syncStatus");
      
      try {
        statusIcon.className = "ph ph-arrows-clockwise spinning"; // Animation placeholder
        await setDoc(doc(db, "projects", "user_code"), {
          content: code,
          lastUpdated: new Date()
        });
        statusIcon.className = "ph ph-cloud-check";
        statusText.innerHTML = `<i class="ph ph-cloud-check"></i> Cloud Synced`;
      } catch (e) {
        console.error("Firebase Save Error:", e);
        statusIcon.className = "ph ph-cloud-warning";
        statusText.innerHTML = `<i class="ph ph-cloud-warning"></i> Save Failed`;
      }
    };

    window.loadCloud = async () => {
      try {
        const docSnap = await getDoc(doc(db, "projects", "user_code"));
        return docSnap.exists() ? docSnap.data().content : null;
      } catch (e) {
        console.error("Firebase Load Error:", e);
        return null;
      }
    };

    // Auto-load on startup
    window.addEventListener('load', async () => {
      const cloudCode = await window.loadCloud();
      if (cloudCode && window.setCode) {
        window.setCode(cloudCode);
      }
    });
  </script>

  <script src="js/editor.js"></script>
  <script src="js/ai-ui.js"></script>
  <script src="js/main.js"></script>
</body>
  </html>
