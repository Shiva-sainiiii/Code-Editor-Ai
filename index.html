<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Shiva Code Editor — Professional AI IDE</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="app-header">
    <div class="logo-section">
      <div class="logo-icon"><i class="ph-fill ph-lightning"></i></div>
      <h1>Shiva <span>Editor</span></h1>
    </div>
    
    <nav class="top-buttons" role="toolbar" aria-label="Editor actions">
      <button onclick="runPreview()" class="btn-primary" title="Run Code">
        <i class="ph ph-play"></i> <span>Preview</span>
      </button>
      <div class="v-separator"></div>
      <button onclick="openFile()" title="Open File">
        <i class="ph ph-folder-open"></i> <span>Open</span>
      </button>
      <button onclick="saveFile()" title="Save File">
        <i class="ph ph-floppy-disk"></i> <span>Save</span>
      </button>
      <button onclick="copyCode()" title="Copy All">
        <i class="ph ph-copy"></i>
      </button>
      <button onclick="clearEditor()" class="btn-danger" title="Clear All">
        <i class="ph ph-trash"></i>
      </button>
    </nav>
  </header>

  <main class="main-container">
    <section class="editor-wrapper">
      <div id="lineNumbers" class="line-numbers">1</div>

      <div id="codeArea" 
           class="code-area" 
           contenteditable="true" 
           spellcheck="false" 
           aria-label="Code editor"></div>
      
      <div id="suggestBox" class="suggest-box"></div>
    </section>

    <footer class="status-bar">
      <div class="status-left">
        <span id="cursorPos">Ln 1, Col 1</span>
      </div>
      <div class="status-right">
        <span>UTF-8</span>
        <span class="lang-tag">HTML / JS</span>
        <div class="connection-dot"></div>
      </div>
    </footer>
  </main>

  <aside class="bottom-toolbar">
    <div class="button-group">
      <button onclick="fontMinus()" title="Zoom Out"><i class="ph ph-magnifying-glass-minus"></i></button>
      <button onclick="fontPlus()" title="Zoom In"><i class="ph ph-magnifying-glass-plus"></i></button>
    </div>
    <div class="v-separator"></div>
    <button onclick="toggleWrap()" id="wrapBtn" title="Toggle Word Wrap">
      <i class="ph ph-text-wrap"></i>
    </button>
    <div class="v-separator"></div>
    <div class="button-group">
      <button onclick="undo()" title="Undo"><i class="ph ph-arrow-u-up-left"></i></button>
      <button onclick="redo()" title="Redo"><i class="ph ph-arrow-u-up-right"></i></button>
    </div>
  </aside>

  <button class="ai-fab" aria-label="Open AI Assistant" onclick="openAIPanel()">
    <div class="ai-icon-glow"></div>
    <i class="ph-fill ph-sparkle"></i>
    <span class="ai-label">AI Assistant</span>
  </button>

  <div id="aiPanel" class="ai-panel" aria-hidden="true" role="dialog">
    <div class="ai-header">
      <div id="dragHandle" class="drag-handle"></div>
      <div class="ai-nav">
        <div class="ai-tabs" role="tablist">
          <button id="tabAnalyze" class="tab active" onclick="showAnalyze()">
            <i class="ph ph-magnifying-glass"></i> Analyze
          </button>
          <button id="tabConvert" class="tab" onclick="showConvert()">
            <i class="ph ph-code"></i> Generator
          </button>
        </div>
        <div class="ai-actions">
          <button class="icon-btn" onclick="clearAiChat()" title="Clear Chat"><i class="ph ph-eraser"></i></button>
          <button class="icon-btn close-btn" onclick="closeAIPanel()"><i class="ph ph-x"></i></button>
        </div>
      </div>
    </div>

    <div class="ai-content-wrapper">
      
      <div id="pageAnalyze" class="ai-page">
        <div class="ai-action-bar">
          <button class="action-btn main" onclick="analyzeCode()">
            <i class="ph ph-bug"></i> Find Bugs
          </button>
          <button class="action-btn" onclick="copyAIOutput()">
            <i class="ph ph-copy-simple"></i> Copy Output
          </button>
        </div>
        
        <div id="aiOutput" class="ai-output" aria-live="polite">
          <div class="welcome-msg">
            <i class="ph ph-robot"></i>
            <p>Ready to analyze your code. Click "Find Bugs" or ask a question below.</p>
          </div>
        </div>

        <div class="ai-input-container">
          <div class="input-wrapper">
            <input id="aiInput" type="text" placeholder="Ask anything about your code..." />
            <button onclick="sendAI()" class="send-btn">
              <i class="ph-fill ph-paper-plane-right"></i>
            </button>
          </div>
        </div>
      </div>

      <div id="pageConvert" class="ai-page" style="display:none;">
        <div class="generator-box">
          <div class="gen-header">
            <h3>Describe the code you need</h3>
            <span class="tip">Example: "A responsive navigation bar with a glass effect"</span>
          </div>
          <textarea id="convertPrompt" placeholder="Type your requirements here..."></textarea>
          
          <div class="gen-footer">
            <button onclick="convertTextToCode(false)" class="btn-gen-insert">
              <i class="ph ph-magic-wand"></i> Generate & Insert
            </button>
            <button onclick="convertTextToCode(true)" class="btn-gen-preview">
              <i class="ph ph-eye"></i> Preview Only
            </button>
          </div>
        </div>
      </div>
      
    </div>
  </div>

  <textarea id="pasteHelper" style="position:fixed; left:-9999px; top:-9999px; opacity:0;"></textarea>

  <script src="js/editor.js"></script>
  <script src="js/ai-ui.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
